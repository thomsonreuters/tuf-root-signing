# =============================================================================
# Online sign
# =============================================================================
#
# Signs `snapshot.json` and `timestamp.json` with the online KMS key. Runs
# every six hours on a schedule, on every push to `main` that touches an
# offline metadata file, and on manual dispatch.
#
# =============================================================================

name: Online sign

on:
  schedule:
    # 01:45 / 07:45 / 13:45 / 19:45 UTC. Offset 30 minutes from
    # `create-signing-events`.
    - cron: '45 1,7,13,19 * * *'
  push:
    branches: [main]
    paths:
      - 'metadata/**'
      - '!metadata/timestamp.json'
      - '!metadata/snapshot.json'
  workflow_dispatch:

permissions: {}

concurrency:
  group: online-sign
  cancel-in-progress: false

jobs:
  online-sign:
    name: Sign snapshot.json + timestamp.json with KMS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: write
      actions:  write
    steps:
      - id: app-token
        name: Mint a GitHub App installation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id:   ${{ secrets.TUF_ON_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.TUF_ON_CI_APP_PRIVATE_KEY }}

      - id: online-sign
        name: Sign snapshot and timestamp via AWS KMS
        uses: theupdateframework/tuf-on-ci/actions/online-sign@4e63a5934064216b7caa7a4a833b1b0936bec660 # v0.20.0
        with:
          token:              ${{ steps.app-token.outputs.token }}
          aws_role_to_assume: arn:aws:iam::751317295400:role/service-role/a209440-tuf-online-signer
          aws_region:         us-east-1

      - name: Summarise outcome
        if: always()
        run: |
          {
            echo "## Online signing"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| IAM role | \`a209440-tuf-online-signer\` |"
            echo "| Outcome | \`${{ steps.online-sign.outcome }}\` |"
            echo "| Triggered by | \`${{ github.event_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  update-issue:
    name: Update tracking issue
    runs-on: ubuntu-latest
    needs: [online-sign]
    if: always() && !cancelled()
    timeout-minutes: 5
    permissions:
      contents: read
      issues:   write
    steps:
      - name: Open / close the workflow's tracking issue based on outcome
        uses: theupdateframework/tuf-on-ci/actions/update-issue@4e63a5934064216b7caa7a4a833b1b0936bec660 # v0.20.0
        with:
          token:   ${{ secrets.GITHUB_TOKEN }}
          success: ${{ !contains(needs.*.result, 'failure') }}
