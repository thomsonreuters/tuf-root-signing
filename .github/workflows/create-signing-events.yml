# =============================================================================
# Create signing events
# =============================================================================
#
# Scheduled. Inspects every TUF role's `signed.expires` and opens a
# `sign/<role>-renewal` pull request whenever a role enters its signing period.
# This is the mechanism that prevents the repository from falling out of
# validity through inattention. Even if every keyholder is unavailable, the
# pull request is still opened automatically.
#
# =============================================================================

name: Create signing events

on:
  schedule:
    # 01:15 / 07:15 / 13:15 / 19:15 UTC. Staggered 30 minutes before
    # online-sign so the two scheduled workflows never queue behind
    # each other.
    - cron: '15 1,7,13,19 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: create-signing-events
  cancel-in-progress: false

jobs:
  create-signing-events:
    name: Open sign/<role>-renewal PRs for upcoming expiries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write     # commit to sign/* branches
      actions:  write     # dispatch downstream signing-event workflow runs
    steps:
      - id: app-token
        name: Mint a GitHub App installation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id:   ${{ secrets.TUF_ON_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.TUF_ON_CI_APP_PRIVATE_KEY }}

      - name: Inspect role expiries and open signing events
        uses: theupdateframework/tuf-on-ci/actions/create-signing-events@4e63a5934064216b7caa7a4a833b1b0936bec660 # v0.20.0
        with:
          token: ${{ steps.app-token.outputs.token }}

  update-issue:
    name: Update tracking issue
    runs-on: ubuntu-latest
    needs: [create-signing-events]
    if: always() && !cancelled()
    timeout-minutes: 5
    permissions:
      contents: read
      issues:   write
    steps:
      - name: Open / close the workflow's tracking issue based on outcome
        uses: theupdateframework/tuf-on-ci/actions/update-issue@4e63a5934064216b7caa7a4a833b1b0936bec660 # v0.20.0
        with:
          token:   ${{ secrets.GITHUB_TOKEN }}
          success: ${{ !contains(needs.*.result, 'failure') }}
